<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">Guía de uso de Newen</title>
  <desc id="desc">Guía visual en español para usar Newen con consistencia, recordatorios, notas y reflexión.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff7ef"/>
      <stop offset="0.55" stop-color="#f4eadf"/>
      <stop offset="1" stop-color="#ecf6e8"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0d6b43"/>
      <stop offset="1" stop-color="#22a6a1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#6b5a44" flood-opacity="0.22"/>
    </filter>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #132421; }
      .serif { font-family: Georgia, "Times New Roman", serif; fill: #0b3f31; font-weight: 700; }
      .muted { fill: #5b625e; }
      .item-title { font-size: 23px; font-weight: 700; }
      .item-body { font-size: 19px; fill: #333c39; }
      .screen-title { font-size: 19px; font-weight: 700; }
      .screen-small { font-size: 13px; fill: #4f5753; }
      .pill { fill: #f7f0e9; stroke: #eee4da; }
      .card { fill: #fbf7f2; stroke: #eadfd5; }
    </style>
  </defs>

  <rect width="1536" height="1024" fill="url(#bg)"/>
  <circle cx="1430" cy="92" r="170" fill="#d9e6ce" opacity="0.55"/>
  <circle cx="1450" cy="314" r="116" fill="#d5c3a8" opacity="0.34"/>
  <circle cx="78" cy="922" r="150" fill="#e8d2c0" opacity="0.28"/>

  <g transform="translate(54 48)">
    <circle cx="34" cy="38" r="35" fill="#d5efdf"/>
    <circle cx="34" cy="16" r="8" fill="#ff8c62"/>
    <path d="M13 47c5-30 25-34 31-5 6-29 26-25 29 6-13 11-23 17-30 20-12-4-22-10-30-21z" fill="none" stroke="url(#brand)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="84" y="55" font-size="48" font-weight="700">newen</text>
  </g>

  <text class="serif" x="52" y="226" font-size="72">
    <tspan x="52">Sacá el máximo</tspan>
    <tspan x="52" dy="78">provecho de Newen</tspan>
  </text>
  <text class="muted" x="52" y="360" font-size="28">Hábitos simples. Insights más profundos.</text>

  <g transform="translate(54 402)">
    <g>
      <circle cx="34" cy="30" r="30" fill="#cfe8d5"/>
      <text x="34" y="40" text-anchor="middle" font-size="29" fill="#0a6b48">1</text>
      <text class="item-title" x="94" y="24">Sé constante, no perfecto</text>
      <text class="item-body" x="94" y="54">Unos pocos registros por día pueden revelar patrones.</text>
      <line x1="94" y1="84" x2="500" y2="84" stroke="#bdb2a7"/>
    </g>
    <g transform="translate(0 106)">
      <circle cx="34" cy="30" r="30" fill="#ded0ee"/>
      <text x="34" y="41" text-anchor="middle" font-size="30" fill="#4d2d6f">2</text>
      <text class="item-title" x="94" y="24">Usá recordatorios si te ayudan</text>
      <text class="item-body" x="94" y="54">Mañana, mediodía y noche dan una visión completa.</text>
      <line x1="94" y1="84" x2="500" y2="84" stroke="#bdb2a7"/>
    </g>
    <g transform="translate(0 212)">
      <circle cx="34" cy="30" r="30" fill="#ffc294"/>
      <text x="34" y="41" text-anchor="middle" font-size="31" fill="#753d18">3</text>
      <text class="item-title" x="94" y="24">Registrá tantos momentos como quieras</text>
      <text class="item-body" x="94" y="54">Capturá lo relevante cuando pasa, no solo al final.</text>
      <line x1="94" y1="84" x2="500" y2="84" stroke="#bdb2a7"/>
    </g>
    <g transform="translate(0 318)">
      <circle cx="34" cy="30" r="30" fill="#f5d176"/>
      <text x="34" y="41" text-anchor="middle" font-size="31" fill="#694b00">4</text>
      <text class="item-title" x="94" y="24">Sumá notas cuando puedas</text>
      <text class="item-body" x="94" y="54">Una nota corta ayuda a recordar el contexto.</text>
      <line x1="94" y1="84" x2="500" y2="84" stroke="#bdb2a7"/>
    </g>
    <g transform="translate(0 424)">
      <circle cx="34" cy="30" r="30" fill="#c9dff0"/>
      <text x="34" y="41" text-anchor="middle" font-size="31" fill="#28506e">5</text>
      <text class="item-title" x="94" y="24">Reflexioná sobre tus patrones</text>
      <text class="item-body" x="94" y="54">Tomate un momento para entender qué se repite.</text>
      <line x1="94" y1="84" x2="500" y2="84" stroke="#bdb2a7"/>
    </g>
    <g transform="translate(0 530)">
      <circle cx="34" cy="30" r="30" fill="#cfe8d5"/>
      <text x="34" y="41" text-anchor="middle" font-size="31" fill="#0a6b48">6</text>
      <text class="item-title" x="94" y="24">Si tenés Apple Watch, aprovechalo</text>
      <text class="item-body" x="94" y="54">Registrá estados y hacé reflexiones breves.</text>
    </g>
  </g>

  <g transform="translate(682 45)" filter="url(#shadow)">
    <rect x="0" y="0" width="430" height="914" rx="68" fill="#161616"/>
    <rect x="20" y="20" width="390" height="874" rx="52" fill="#fbf7f2"/>
    <rect x="150" y="28" width="130" height="34" rx="17" fill="#111"/>
    <text x="66" y="58" font-size="15" font-weight="700">13:44</text>
    <text x="214" y="104" text-anchor="middle" font-size="18" font-weight="700">Newen</text>
    <circle cx="64" cy="100" r="25" fill="#f7f0e9"/>
    <circle cx="356" cy="100" r="25" fill="#f7f0e9"/>
    <text x="64" y="109" text-anchor="middle" font-size="24">◐</text>
    <text x="356" y="109" text-anchor="middle" font-size="22">•••</text>

    <text class="screen-title" x="52" y="153">Patrones destacados</text>
    <text class="screen-small" x="52" y="174">Algunas señales de tus registros recientes.</text>
    <rect class="card" x="48" y="194" width="332" height="88" rx="18"/>
    <circle cx="76" cy="228" r="17" fill="#ffe4a3"/>
    <text x="76" y="236" text-anchor="middle" font-size="21">☀</text>
    <text x="104" y="224" font-size="14" font-weight="700">Los jueves suelen sentirse más livianos.</text>
    <text class="screen-small" x="104" y="248">Esta semana aparecieron más momentos de calma.</text>

    <text class="screen-small" x="52" y="324">Señal emocional</text>
    <text class="screen-title" x="52" y="348">¿Cómo te sentís?</text>
    <rect class="pill" x="52" y="374" width="102" height="34" rx="13"/>
    <rect class="pill" x="164" y="374" width="102" height="34" rx="13"/>
    <rect class="pill" x="276" y="374" width="102" height="34" rx="13"/>
    <text x="103" y="397" text-anchor="middle" font-size="13">Ánimo</text>
    <text x="215" y="397" text-anchor="middle" font-size="13">Contexto</text>
    <text x="327" y="397" text-anchor="middle" font-size="13">Nota</text>

    <circle cx="58" cy="436" r="13" fill="#0b6b55"/>
    <text x="58" y="445" text-anchor="middle" font-size="14" fill="#fff">1</text>
    <text class="screen-title" x="82" y="442">Ánimo</text>
    <text class="screen-small" x="82" y="462">Elegí la emoción más cercana.</text>

    <g transform="translate(52 486)">
      <rect class="card" x="0" y="0" width="102" height="100" rx="14"/>
      <rect class="card" x="112" y="0" width="102" height="100" rx="14"/>
      <rect class="card" x="224" y="0" width="102" height="100" rx="14"/>
      <rect class="card" x="0" y="112" width="102" height="100" rx="14"/>
      <rect class="card" x="112" y="112" width="102" height="100" rx="14"/>
      <rect class="card" x="224" y="112" width="102" height="100" rx="14"/>
      <rect class="card" x="0" y="224" width="102" height="100" rx="14"/>
      <rect class="card" x="112" y="224" width="102" height="100" rx="14"/>
      <rect class="card" x="224" y="224" width="102" height="100" rx="14"/>
      <text x="18" y="35" font-size="24">☀</text><text x="16" y="66" font-size="14" font-weight="700">Luminoso</text><text class="screen-small" x="16" y="84">liviano</text>
      <text x="130" y="35" font-size="24">◒</text><text x="128" y="66" font-size="14" font-weight="700">Calmo</text><text class="screen-small" x="128" y="84">estable</text>
      <text x="242" y="35" font-size="24">♡</text><text x="240" y="66" font-size="14" font-weight="700">Agradecido</text><text class="screen-small" x="240" y="84">abierto</text>
      <text x="18" y="147" font-size="24">✦</text><text x="16" y="178" font-size="14" font-weight="700">Energizado</text><text class="screen-small" x="16" y="196">activo</text>
      <text x="130" y="147" font-size="24">⚡</text><text x="128" y="178" font-size="14" font-weight="700">Tenso</text><text class="screen-small" x="128" y="196">cargado</text>
      <text x="242" y="147" font-size="24">▲</text><text x="240" y="178" font-size="14" font-weight="700">Frustrado</text><text class="screen-small" x="240" y="196">bloqueado</text>
      <text x="18" y="259" font-size="24">☁</text><text x="16" y="290" font-size="14" font-weight="700">Pesado</text><text class="screen-small" x="16" y="308">bajo</text>
      <text x="130" y="259" font-size="24">◎</text><text x="128" y="290" font-size="14" font-weight="700">Abrumado</text><text class="screen-small" x="128" y="308">demasiado</text>
      <text x="242" y="259" font-size="24">◌</text><text x="240" y="290" font-size="14" font-weight="700">Nublado</text><text class="screen-small" x="240" y="308">confuso</text>
    </g>
  </g>

  <g transform="translate(1128 487)" filter="url(#shadow)">
    <rect width="288" height="336" rx="62" fill="#161616"/>
    <rect x="18" y="18" width="252" height="300" rx="46" fill="#070807"/>
    <text x="52" y="70" font-size="19" fill="#8bf0b2">Newen</text>
    <text x="206" y="70" font-size="18" fill="#fff">13:48</text>
    <rect x="44" y="92" width="88" height="88" rx="16" fill="#202421"/>
    <rect x="150" y="92" width="88" height="88" rx="16" fill="#202421"/>
    <rect x="44" y="198" width="88" height="88" rx="16" fill="#202421"/>
    <rect x="150" y="198" width="88" height="88" rx="16" fill="#202421"/>
    <text x="88" y="130" text-anchor="middle" font-size="28">☀</text>
    <text x="194" y="130" text-anchor="middle" font-size="28">◒</text>
    <text x="88" y="236" text-anchor="middle" font-size="28">♡</text>
    <text x="194" y="236" text-anchor="middle" font-size="28">✦</text>
    <text x="88" y="162" text-anchor="middle" font-size="16" fill="#fff">Luminoso</text>
    <text x="194" y="162" text-anchor="middle" font-size="16" fill="#fff">Calmo</text>
    <text x="88" y="268" text-anchor="middle" font-size="16" fill="#fff">Agradecido</text>
    <text x="194" y="268" text-anchor="middle" font-size="16" fill="#fff">Energizado</text>
  </g>
</svg>
